input {
  mongodb {
    # 1. Database name fixed to threat_intel
    uri => 'mongodb://${MONGO_USER}:${MONGO_PASS}@atip-mongodb:27017/threat_intel?authSource=admin'
    placeholder_db_dir => '/opt/logstash-mongodb/'
    placeholder_db_name => 'logstash_sqlite.db'
    # 2. Collection name fixed to indicators
    collection => 'indicators'
    batch_size => 5000
  }
}

filter {
  # --- Handle MongoDB _id ---
  mutate {
    rename => { "_id" => "mongo_id" }
  }
  if [mongo_id] {
    if [mongo_id][$oid] {
      mutate {
        add_field => { "indicator_id" => "%{[mongo_id][$oid]}" }
      }
    } else {
      mutate {
        add_field => { "indicator_id" => "%{mongo_id}" }
      }
    }
  }
  mutate {
    remove_field => [ "mongo_id" ]
  }

  # --- TYPE CONVERSIONS ---
  # Normalize all numeric threat metrics to integers so Kibana can do
  # aggregations, histograms, and range filters on them.
  mutate {
    convert => {
      "risk_score"         => "integer"
      "preliminary_score"  => "integer"
      "vt_malicious"       => "integer"
      "vt_harmless"        => "integer"
      "vt_suspicious"      => "integer"
      "vt_undetected"      => "integer"
      "vt_reputation"      => "integer"
    }
  }

  # --- Handle mitre_techniques nested array ---
  # The mongodb plugin imports this as an array of hashes [{id, name}, ...].
  # Elasticsearch doesn't handle nested objects well without explicit mapping,
  # so we flatten them into two keyword arrays for easy Kibana filtering.
  if [mitre_techniques] {
    ruby {
      code => '
        techniques = event.get("mitre_techniques")
        if techniques.is_a?(Array)
          ids   = techniques.map { |t| t.is_a?(Hash) ? t["id"]   : nil }.compact
          names = techniques.map { |t| t.is_a?(Hash) ? t["name"] : nil }.compact
          event.set("mitre_ids",   ids)
          event.set("mitre_names", names)
        end
      '
    }
    mutate {
      remove_field => [ "mitre_techniques" ]
    }
  }

  # --- Remove bulky redundant field ---
  # log_entry is a raw Ruby hash dump of the original doc; all its data
  # already exists as top-level fields, so it just wastes storage.
  mutate {
    remove_field => [ "log_entry" ]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "threat-intel-indicators-%{+YYYY.MM.dd}"
    document_id => "%{indicator_id}"
  }
  stdout { codec => rubydebug }
}
